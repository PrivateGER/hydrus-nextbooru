name: Performance

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  workflow_dispatch:
    inputs:
      dataset:
        description: 'Dataset size for timing benchmarks'
        type: choice
        options: [small, medium, large]
        default: medium

permissions:
  contents: read

jobs:
  # Deterministic performance guards: query-plan regression checks and
  # query-count (N+1) budgets. These are CI-stable — they assert on plan
  # structure and statement counts, never on wall-clock time.
  guards:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Run performance guards
        run: npm run test:guards
        env:
          TESTCONTAINERS_RYUK_DISABLED: true

  # Wall-clock benchmarks are report-only on shared runners (thresholds are
  # not enforced when CI is set) and only run on demand. Trend tracking on a
  # schedule is planned to replace ad-hoc inspection of these numbers.
  benchmarks:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://dummy:dummy@localhost:5432/dummy

      - name: Run timing benchmarks (report only)
        run: npm run test:perf
        env:
          PERF_DATASET_SIZE: ${{ inputs.dataset }}
          TESTCONTAINERS_RYUK_DISABLED: true
